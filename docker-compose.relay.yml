# Minimal relay-node compose — backend only, no frontend needed.
services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: shadowbroker-relay
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - relay_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  relay_data:
