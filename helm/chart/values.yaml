shadowbroker:
  controllers:

    backend:
      type: deployment
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
      containers:
        main:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          image:
            pullPolicy: Always
            # GHCR (primary, public, auto-built on every push to main).
            # GitLab fallback: registry.gitlab.com/bigbodycobain/shadowbroker/backend (requires auth + currently no CI builds it).
            repository: ghcr.io/bigbodycobain/shadowbroker-backend
            tag: latest
          env:
            AIS_API_KEY:
              secretKeyRef:
                name: shadowbroker-env
                key: AIS_API_KEY
            OPENSKY_CLIENT_ID:
              secretKeyRef:
                name: shadowbroker-env
                key: OPENSKY_CLIENT_ID
            OPENSKY_CLIENT_SECRET:
              secretKeyRef:
                name: shadowbroker-env
                key: OPENSKY_CLIENT_SECRET

    frontend:
      type: deployment
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
      containers:
        main:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          image:
            pullPolicy: Always
            # GHCR (primary, public, auto-built on every push to main).
            # GitLab fallback: registry.gitlab.com/bigbodycobain/shadowbroker/frontend (requires auth + currently no CI builds it).
            repository: ghcr.io/bigbodycobain/shadowbroker-frontend
            tag: latest

          env:
            BACKEND_URL: 'http://shadowbroker-backend.shadowbroker.svc.cluster.local:8000'

  service:
    backend:
      controller: backend
      type: ClusterIP
      ports:
        http:
          port: 8000
    frontend:
      controller: frontend
      type: ClusterIP
      ports:
        http:
          port: 3000
